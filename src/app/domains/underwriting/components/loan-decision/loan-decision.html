@if (currentLoan(); as loan) {
  <app-topbar> Review Queue -> {{ loan.applicant.fullName }} </app-topbar>
  <div id="decision-container">
    <div>
      <app-loan-details [loan]="loan"></app-loan-details>
      @if (riskProfile(); as risk) {
        <app-card>
          <h2>Risk Flags, {{ risk.score }}</h2>
          <div>
            @for (flag of risk.flags; track $index) {
              <p>{{ flag }}</p>
            }
          </div>
          <div>
            {{ risk.riskLevel }}
          </div>
          <div>
            {{ risk.explanation }}
          </div>
        </app-card>
      }
    </div>
    <div>
      <app-loan-details [loan]="loan"></app-loan-details>
    </div>
  </div>
}
