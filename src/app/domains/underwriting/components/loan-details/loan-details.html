<div id="loan-details">
  <h2>Loan Details</h2>
  <app-card>
    <p>ID: {{ loan.id }}</p>
    <p>Type: {{ loan.type }}</p>
    <p>Amount: {{ loan.requestedAmount }} {{ loan.currency || 'USD' }}</p>
    <p>Term: {{ loan.termMonths }} months</p>
    <p>Status: {{ loan.status }}</p>
    <p>Applicant: {{ loan.applicant.fullName }}</p>
  </app-card>
</div>
